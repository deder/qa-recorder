<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 175" role="img" aria-labelledby="title desc">
  <title id="title">DitBug application icon</title>
  <desc id="desc">Smooth vector retrace of the approved DitBug symbol.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121722"/>
      <stop offset="0.62" stop-color="#090D15"/>
      <stop offset="1" stop-color="#06080D"/>
    </linearGradient>
    <radialGradient id="coral" cx="35%" cy="28%" r="86%">
      <stop offset="0" stop-color="#FF6B5A"/>
      <stop offset="0.82" stop-color="#FF4B3B"/>
      <stop offset="1" stop-color="#F13E31"/>
    </radialGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.27"/>
    </filter>
  </defs>

  <!-- Original rounded dark app tile -->
  <rect x="6" y="6" width="163" height="163" rx="37" fill="url(#tile)" filter="url(#tileShadow)"/>
  <rect x="7.5" y="7.5" width="160" height="160" rx="35.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>

  <!-- Smooth retrace of the approved white symbol -->
  <path d="M 96 116
           L 78 129
           C 71 124, 64 120, 58 115
           C 47 106, 42 95, 43 82
           C 43 63, 58 50, 77 50
           C 97 50, 112 64, 114 82
           C 115 93, 112 102, 107 108
           L 120 118"
        fill="none"
        stroke="#F9F9FA"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Central bug marker -->
  <circle cx="79" cy="87" r="17" fill="url(#coral)"/>

  <!-- Voice / alert strokes -->
  <g fill="none" stroke="url(#coral)" stroke-width="7" stroke-linecap="round">
    <path d="M 114 45 L 118 33"/>
    <path d="M 123 54 L 136 44"/>
    <path d="M 128 66 L 140 66"/>
  </g>
</svg>
